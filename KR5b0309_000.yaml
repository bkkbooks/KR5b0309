front:
  text: 龍瑞觀禹穴陽明洞天圖經鞠七
  hash: sha256:639cde1889ad6ceb9318c83d952505cd7c72e88666def4122bf6ab221be0cad2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0309_HFL_000-001a, image: hfl/0332/0332-046.png}
body:
  text: 宋翰林學士李宗諤修定㑹稽龍瑞觀在縣東南一十五里即大禹探靈寳五符治水之所唐神龍元年置懷仙館開元二年勑葉天師設醮而龍見因改賜今額㑹稽山在縣東一十二里揚州之鎮山曰㑹稽山海經云上多金玉下多珠石一名衡山輿地志云㑹稽山一名衡山其山有石狀如覆鬴亦謂之覆鬴山皇覽曰㑹稽山本名苗山越傳曰禹到大越上苗山大㑹計爵有徳封有功因而更名苗山曰㑹稽史記封禪書云禹封泰山禪㑹稽黄帝玄女兵法曰禹問風后曰吾聞黄帝有負勝之圖六甲隂陽之道今在乎風后曰黃帝藏於㑹稽之山其坎深千尺鎮以盤石又遁甲開山圖曰禹治水至㑹稽宿於衡嶺宛委之神奏玉匱之書十二卷以授禹禹未及持之四卷飛入泉四卷飛上天禹得四卷開而視之乃遁甲開山圖因以治水訖乃緘書於洞穴按龜山白玉經曰㑹稽山周廻三百五十里名陽明洞天一也唐開元十年封四鎮爲公故㑹稽山爲南鎮永興公宛委山在縣東一十五里遁甲開山圖曰禹開宛委山得赤珪如日白珪如月長一尺二寸吳越春秋曰九山東南曰天柱號宛委承以文玉覆以盤石中藏金簡書以青玉爲字編以白銀禹東廵狩至衡山血白馬以祭之見赤繡衣男子自稱元夷蒼永使者欲得簡書知導水之方請齋於黄帝之嶽禹齋登山發石果得其文乃知四瀆之限百川之理遂周天下而盡力於溝洫矣一名石簣山輿地志云宛委山上有石匱壁立干雲升者累梯而至射的山在縣南一十五里孔曄㑹稽志云射的山畔有石室乃仙人射堂東峯有射的遥望山壁有白㸃如射的土人常以占榖貴賤故語云射的白米斛百射的玄米斛千西有石壁室深可二丈遥望類師子口人謂之師子巖即仙人射堂也箭羽山在縣東一十六里孔靈符㑹稽記云此山有射的山西南水中有白鶴爲仙人取箭因號箭羽山鄭洪山在縣東三十里後漢鄭洪字巨君㑹稽山隂人也孔靈符㑹稽記云射的山南有白鶴山此鶴爲仙人取箭漢太尉鄭洪嘗採薪得一遺箭頃有人覓見洪還之問何所欲洪識其神人也曰常患若溪載薪爲難願朝南風暮北風後果然故若耶溪風至今猶爾呼爲鄭公風亦名樵風自龍瑞觀以下并山並見越州圖經臣樞伏覩唐開元以來洎聖宋每年春遣使投玉簡放金龍於陽明洞即大禹治水藏書之穴也方於治平年間罷此禮臣樞又伏覩寧州真寧縣圖經載仙人之事言唐明皇夣身在羅互與群仙㑹㝷訪問寧州真寧縣有羅郷互里乃遣使往彼求訪神仙無所得憂惶間遇一老人問其所求乃指使者曰隨我行及前忽見老人化爲白兔入地穴使者隨而掘之獲二十七玉仙人人各面前有一牌並列姓名得道處若鄭思逺泰山得道荀安禮華山得道並齎歸京師入内道場供飬備見事實此粗記其略貴亦知其大㮣耳政和四年二月越州特奏名進士勑授濰助教臣葉樞謹記龍瑞觀禹穴陽明洞天圖經
